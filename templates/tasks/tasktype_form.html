{% extends "base.html" %}
{% block title %}
  {% if object %}Update{% else %}Create{% endif %} Task Type | Task Manager
{% endblock %}
{% block content %}
  <h1>{% if object %}Update{% else %}Create{% endif %} Task Type</h1>
  <form action="" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Save">
    <a href="{% url "tasks:task-type-list" %}">Cancel</a>
  </form>
{% endblock %}
