{% extends "base.html" %}
{% block title %}
  {% if object %}Update{% else %}Create{% endif %} Task Type | Task Manager
{% endblock %}
{% block content %}
  <h1>{% if object %}Update{% else %}Create{% endif %} Task Type</h1>
  <form action="" method="post">
    {% csrf_token %}
    {{ form }}
    <input type="submit" value="Save">
  </form>
  <p><a href="{% url "tasks:position-list" %}">Back to task type list</a></p>
{% endblock %}
