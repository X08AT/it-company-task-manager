{% extends "base.html" %}
{% block title %}Delete Task Type | Task Manager{% endblock %}
{% block content %}
  <h1>Delete task type {{ task_type.name }} ?</h1>
  <form action="" method="post">
    {% csrf_token %}
    <input type="submit" value="Yes, Delete">
    <a href="{% url "tasks:task-type-list" %}">Cancel</a>
  </form>

{% endblock %}
