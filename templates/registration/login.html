{% extends "base.html" %}
{% block title %}Log in | Task Manager{% endblock %}

{% block content %}
  <h2>Login to Task Manager</h2>
  <form method="post" action="{% url "login" %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
  </form>
  <p>
    Don't have an account yet? <a href="{% url 'tasks:signup' %}">Register here</a>.
  </p>
{% endblock %}
